[build]
builder = "NIXPACKS"

[deploy]
# Streamlit exposes its health endpoint at /_stcore/health (returns 200 + "ok"
# when the server is up). Equivalent of Spring Boot's /actuator/health.
healthcheckPath = "/_stcore/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
